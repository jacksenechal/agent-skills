services:
  playwright-display:
    build:
      context: ./mcp-playwright-novnc
    image: mcp-playwright-novnc:local
    container_name: playwright-display
    ports:
      - "6080:6080"   # noVNC web interface
      - "3080:3080"   # MCP SSE endpoint
    volumes:
      # Resume repo — for programmatic file uploads (resume.pdf)
      - ${RESUME_REPO_PATH}:/home/pwuser/resume:ro
      # Workaround: Claude Code sends MCP roots as host paths → EACCES in container.
      # Custom start-mcp.sh adds --output-dir to override.
      - ./start-mcp.sh:/usr/local/bin/start-mcp.sh:ro
    environment:
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1080
      - MCP_BROWSER=chromium
      - MCP_PORT=3080
    shm_size: '2gb'
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    networks:
      - playwright-network

networks:
  playwright-network:
    name: playwright-network
